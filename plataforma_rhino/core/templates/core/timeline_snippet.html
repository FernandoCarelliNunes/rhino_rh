<style>
  .timeline-steps {
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .timeline-step {
    position: relative;
    margin-bottom: 1.5rem;
    padding-left: 3rem;
  }
  .timeline-step::before {
    content: "";
    position: absolute;
    left: 0.75rem;
    top: 0;
    height: 100%;
    width: 2px;
    background: #e9ecef;
    z-index: 1;
  }
  .timeline-step:last-child::before {
    display: none;
  }
  .timeline-icon {
    position: absolute;
    left: 0;
    top: 0;
    width: 1.5rem;
    height: 1.5rem;
    border-radius: 50%;
    background: #0a1128;
    border: 3px solid #fff;
    z-index: 2;
    box-shadow: 0 0 0 2px #0a1128;
  }
</style>

<div class="card shadow-sm border-0">
  <div class="card-header bg-white fw-bold">Histórico de Movimentações</div>
  <div class="card-body">
    <div class="timeline-steps">
      {% for h in historicos %}
      <div class="timeline-step">
        <div class="timeline-icon"></div>
        <div class="ms-2">
          <h6 class="mb-0 fw-bold">{{ h.status_novo }}</h6>
          <p class="text-muted small mb-0">
            Mudou de
            <span class="badge bg-light text-dark"
              >{{ h.status_anterior }}</span
            >
            em {{ h.data_mudanca|date:"d/m/Y H:i" }}
          </p>
        </div>
      </div>
      {% empty %}
      <p class="text-muted text-center">
        Ainda não há movimentações para este candidato.
      </p>
      {% endfor %}
    </div>
  </div>
</div>
