{% extends 'core/base.html' %} {% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="fw-bold" style="color: #0a1128">Insights & Indicadores</h2>
  <button onclick="window.print()" class="btn btn-outline-dark btn-sm">
    🖨️ Exportar PDF
  </button>
</div>

<div class="row mb-4">
  <div class="col-md-3">
    <div class="card border-0 shadow-sm bg-rhino text-white p-3 text-center">
      <h6 class="text-uppercase small">Total de Vagas</h6>
      <h2 class="fw-bold">{{ total_vagas }}</h2>
    </div>
  </div>
  <div class="col-md-3">
    <div
      class="card border-0 shadow-sm bg-white p-3 text-center border-start border-primary border-4"
    >
      <h6 class="text-uppercase text-muted small">Total de Candidatos</h6>
      <h2 class="fw-bold">{{ total_candidatos }}</h2>
    </div>
  </div>
</div>

<div class="row">
  <div class="col-md-6 mb-4">
    <div class="card border-0 shadow-sm p-4">
      <h5 class="fw-bold mb-3">Funil de Candidatos por Etapa</h5>
      <canvas id="chartStatus"></canvas>
    </div>
  </div>

  <div class="col-md-6 mb-4">
    <div class="card border-0 shadow-sm p-4">
      <h5 class="fw-bold mb-3">Vagas por Cliente</h5>
      <canvas id="chartClientes"></canvas>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  // Gráfico de Status
  const ctxStatus = document.getElementById('chartStatus');
  new Chart(ctxStatus, {
      type: 'bar',
      data: {
          labels: [{% for item in status_candidatos %}'{{ item.status_candidato }}',{% endfor %}],
          datasets: [{
              label: 'Candidatos',
              data: [{% for item in status_candidatos %}{{ item.total }},{% endfor %}],
              backgroundColor: '#0a1128'
          }]
      }
  });

  // Gráfico de Clientes
  const ctxClientes = document.getElementById('chartClientes');
  new Chart(ctxClientes, {
      type: 'pie',
      data: {
          labels: [{% for item in vagas_por_cliente %}'{{ item.cliente__nome }}',{% endfor %}],
          datasets: [{
              data: [{% for item in vagas_por_cliente %}{{ item.total }},{% endfor %}],
              backgroundColor: ['#0d6efd', '#6610f2', '#6f42c1', '#d63384']
          }]
      }
  });
</script>
{% endblock %}
