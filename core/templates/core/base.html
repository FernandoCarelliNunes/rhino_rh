<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RHINO - Gestão de Recrutamento</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
      :root {
        --rhino-blue: #0a1128; /* Azul marinho oficial */
        --rhino-light: #f4f7f6;
      }
      body {
        background-color: var(--rhino-light);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .navbar {
        background-color: var(--rhino-blue);
      }
      .btn-rhino {
        background-color: var(--rhino-blue);
        color: white;
        border: none;
      }
      .btn-rhino:hover {
        background-color: #1a2a5a;
        color: white;
      }

      .navbar-logo {
        height: 35px;
        width: auto;
        margin-right: 12px;
      }

      .nav-link {
        color: rgba(255, 255, 255, 0.8) !important;
        display: flex;
        align-items: center;
      }
      .nav-link i {
        margin-right: 5px;
      }
      .nav-link:hover {
        color: white !important;
      }

      /* Estilo para destacar a seção administrativa */
      .admin-divider {
        width: 1px;
        height: 24px;
        background-color: rgba(255, 255, 255, 0.2);
        margin: 0 15px;
      }

      @media print {
        .navbar,
        .btn,
        .dropdown {
          display: none !important;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm mb-4">
      <div class="container">
        <a
          class="navbar-brand d-flex align-items-center fw-bold"
          href="{% url 'dashboard' %}"
        >
          <img
            src="/media/logos/logo_rhino.png"
            alt="Rhino Logo"
            class="navbar-logo"
          />
          RHINO <span class="fw-light ms-1">consultoria</span>
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'dashboard' %}">
                <i class="bi bi-speedometer2"></i> Dashboard
              </a>
            </li>

            {% if user.is_superuser %}
            <div class="admin-divider d-none d-lg-block"></div>
            <li class="nav-item">
              <a
                class="nav-link text-info fw-bold"
                href="{% url 'cadastrar_cliente' %}"
              >
                <i class="bi bi-building-add"></i> Novo Cliente
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'relatorio_geral' %}">
                <i class="bi bi-graph-up-arrow"></i> Relatório Geral
              </a>
            </li>
            {% endif %}
          </ul>

          <div class="d-flex align-items-center gap-3">
            <span class="text-white-50 small">
              Olá, <strong>{{ user.username }}</strong>
              {% if user.is_superuser %}
              <span
                class="badge bg-warning text-dark ms-1"
                style="font-size: 0.7rem"
                >ADMIN</span
              >
              {% endif %}
            </span>

            <form action="{% url 'logout' %}" method="post" class="m-0">
              {% csrf_token %}
              <button
                type="submit"
                class="btn btn-sm btn-outline-light border-0"
              >
                <i class="bi bi-box-arrow-right"></i> Sair
              </button>
            </form>
          </div>
        </div>
      </div>
    </nav>

    <div class="container mb-5">{% block content %} {% endblock %}</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
